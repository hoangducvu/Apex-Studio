[build]
  publish   = "Apex Studio website"
  functions = "netlify/functions"

[dev]
  port = 8888

# ── API redirects (more specific routes first) ──────────────────────────────
[[redirects]]
  from   = "/api/admin/products/:id/stock"
  to     = "/.netlify/functions/admin-stock?id=:id"
  status = 200

[[redirects]]
  from   = "/api/admin/products/:id"
  to     = "/.netlify/functions/admin-product?id=:id"
  status = 200

[[redirects]]
  from   = "/api/admin/products"
  to     = "/.netlify/functions/admin-products"
  status = 200

[[redirects]]
  from   = "/api/admin/upload-url"
  to     = "/.netlify/functions/admin-upload-url"
  status = 200

[[redirects]]
  from   = "/api/admin/orders"
  to     = "/.netlify/functions/admin-orders"
  status = 200

[[redirects]]
  from   = "/api/admin/stats"
  to     = "/.netlify/functions/admin-stats"
  status = 200

[[redirects]]
  from   = "/api/webhook"
  to     = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from   = "/api/create-payment-intent"
  to     = "/.netlify/functions/create-payment-intent"
  status = 200

[[redirects]]
  from   = "/api/products"
  to     = "/.netlify/functions/products"
  status = 200

[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config"
  status = 200

# Product detail pages — pretty URLs like /products/black-light-20
[[redirects]]
  from   = "/products/:id"
  to     = "/product.html?id=:id"
  status = 200

# Admin panel — serve index.html at /admin
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200
